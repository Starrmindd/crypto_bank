<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Chaotic ECC Banking</title>
  <link rel="icon" type="image/png" sizes="16x16" href="images/favicon.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="main-wrapper">
    <div class="authentication">
      <div class="container">
        <div class="row justify-content-center align-items-center">
          <div class="col-12 col-lg-8 col-xl-5">
            <div class="mini-logo text-center mb-5">
              <a href="index.html"><img src="images/logo.png" alt="Logo"></a>
            </div>
            <div class="auth-form card">
              <div class="card-header justify-content-center">
                <h4 class="card-title">Login</h4>
              </div>
              <div class="card-body">
                <form>
                  <div class="form-group">
                    <label>Unique ID</label>
                    <input type="number" class="form-control" id="uniqueID" placeholder="Enter Unique ID">
                  </div>
                  <div class="text-center mt-4">
                    <button type="button" class="btn btn-success w-100" onclick="loginUser()">
                      Login with MetaMask
                    </button>
                  </div>
                </form>
                <p id="loginMessage" style="color:red;display:none;margin-top:10px">
                  Login failed. Check your Unique ID.
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/web3/dist/web3.min.js"></script>
  <script src="js/abi.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
